name: Client CI

on:
  push:
    paths:
      - 'client/**'
      - '!**/*.md'
      - '.github/workflows/client-ci.yaml'

jobs:
  verify-client:
    name: Verify Client
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js Environment
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 25.8.2
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install Dependencies
        run: npm install

      - name: Check Formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Run Tests with Coverage
        run: npm run test:coverage

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

      - name: Build Static Client
        run: npm run build

      - name: Upload Dist Artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: dist
          path: client/dist

  build-and-publish-client:
    name: Build and Publish Client Image (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    needs: verify-client
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js Environment
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 25.8.2

      - name: Setup Buildpacks Tools
        uses: buildpacks/github-actions/setup-tools@v5.12.0

      - name: Setup Buildpacks Pack
        uses: buildpacks/github-actions/setup-pack@v5.12.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image with Buildpacks
        run: |
          image="ghcr.io/$(npm pkg get author | tr -d '\"')/$(npm pkg get name | tr -d '\"'):$(npm pkg get version | tr -d '\"')"
          pack build "$image-${{ matrix.arch }}" \
            --platform "linux/${{ matrix.arch }}" \
            --publish

  publish-client-manifest:
    name: Publish Client Multi-Arch Manifest
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    needs: build-and-publish-client
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js Environment
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 25.8.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Client Multi-Arch Manifest
        run: |
          image="ghcr.io/$(npm pkg get author | tr -d '\"')/$(npm pkg get name | tr -d '\"'):$(npm pkg get version | tr -d '\"')"
          docker buildx imagetools create \
            --tag "$image" \
            "$image-amd64" \
            "$image-arm64"
