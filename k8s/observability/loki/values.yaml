loki:
  auth_enabled: false

  ingester:
    lifecycler:
      min_ready_duration: 1s

  commonConfig:
    ring:
      instance_addr: 127.0.0.1
      kvstore:
        store: inmemory
    replication_factor: 1
    path_prefix: /var/loki

  storage:
    type: filesystem
    bucketNames:
      chunks: /var/loki/chunks
      ruler: /var/loki/ruler

  schemaConfig:
    configs:
      - from: 2025-10-25
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

deploymentMode: SingleBinary

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    storageClass: nfs-client
    size: 2Gi

gateway:
  nginxConfig:
    enableIPv6: false

backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

test:
  enabled: false

lokiCanary:
  enabled: false

chunksCache:
  enabled: false

resultsCache:
  enabled: false

indexGateway:
  enabled: false

compactor:
  enabled: true
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"

querier:
  enabled: false

queryFrontend:
  enabled: false

queryScheduler:
  enabled: false

distributor:
  enabled: false

ingester:
  enabled: false