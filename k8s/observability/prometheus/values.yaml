alertmanager:
  enabled: false

prometheus-node-exporter:
  enabled: false  # Use existing ones

# Add scrape config for existing node-exporters
extraScrapeConfigs: |
  # Scrape existing kube-prometheus node-exporters
  - job_name: 'node-exporter-existing'
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - default
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
        regex: node-exporter
        action: keep
      - source_labels: [__meta_kubernetes_pod_node_name]
        target_label: instance
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace

server:
  fullnameOverride: prometheus
  service:
    servicePort: 9090

  persistentVolume:
    enabled: true
    storageClass: nfs-client
    size: 2Gi

  extraFlags:
    - web.enable-lifecycle
    - web.enable-otlp-receiver
    - web.enable-remote-write-receiver

  global:
    scrape_interval: 15s
    evaluation_interval: 15s

  otlp:
    keep_identifying_resource_attributes: true
    # Recommended attributes to be promoted to labels.
    promote_resource_attributes:
      - service.instance.id
      - service.name
      - service.namespace
      - service.version
      - cloud.availability_zone
      - cloud.region
      - container.name
      - deployment.environment.name
      - k8s.cluster.name
      - k8s.container.name
      - k8s.cronjob.name
      - k8s.daemonset.name
      - k8s.deployment.name
      - k8s.job.name
      - k8s.namespace.name
      - k8s.pod.name
      - k8s.replicaset.name
      - k8s.statefulset.name

  tsdb:
    # A 10min time window is enough because it can easily absorb retries and network delays.
    out_of_order_time_window: 10m
