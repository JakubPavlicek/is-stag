[_]
schema-version = "0.2"

[io.buildpacks]
exclude = [
    ".git",
    "node_modules",
    "coverage",
    "*.env*",
    ".env*",
    "dist"
]

# Node.js buildpack — installs deps and runs the build script
[[io.buildpacks.build.env]]
name  = "BP_NODE_RUN_SCRIPTS"
value = "build"

[[io.buildpacks.build.env]]
name  = "BP_NODE_VERSION"
value = "24.*"

[[io.buildpacks.build.env]]
name  = "NODE_ENV"
value = "production"

[[build.env]]
name = "BP_OCI_SOURCE"
value = "https://github.com/JakubPavlicek/is-stag"